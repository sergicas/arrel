<!doctype html>
<html lang="ca">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/arrel-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <title>Arrel | No perdre terreny</title>
    <meta
      name="description"
      content="Arrel et proposa proves petites per conservar capacitats: cos, memòria, calma, vincles i identitat. No perdre terreny abans d’hora."
    />
    <meta name="application-name" content="Arrel" />
    <meta name="apple-mobile-web-app-title" content="Arrel" />
    <meta name="format-detection" content="telephone=no" />

    <!-- PWA / Mobile Optimization -->
    <meta name="theme-color" content="#edf9fb" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />

    <!-- Social Preview -->
    <meta property="og:title" content="Arrel | No perdre terreny" />
    <meta
      property="og:description"
      content="Proves petites per conservar cos, memòria, calma, vincles i identitat mentre et fas gran."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://arrel.eu/" />
    <meta property="og:image" content="https://arrel.eu/pwa-512x512.png" />
    <meta property="og:site_name" content="Arrel" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Font Optimization -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Supabase Preconnect -->
    <link rel="preconnect" href="https://api.arrel.eu" />
    <link rel="preconnect" href="https://*.supabase.co" />

    <!-- Critical Route Prefetch -->
    <link rel="prefetch" href="/app" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
